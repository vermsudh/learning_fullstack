<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mondrian Project</title>
  <style>
    /* 
    Write your CSS here 
    Gap Colour: #000
    White: #F0F1EC
    Red: #E72F24
    Black: #232629
    Blue: #004592
    Yellow: #F9D01E

    For dimensions, see dimensions.png image.
    HINT: Remember you can't change the properties of grid lines.
    But grid lines are transparent!
    */
    body{
      display : flex;
      justify-content: center;
      align-items: center;
      margin : 0; 
      padding : 0; 
      height : 100vh;
    }
    .container{
      height : 748px;
      width : 748px;
      display : grid;
      background-color : #000;
      gap : 9px;
      grid-template-columns: 320px 198px 153px 50px;
      grid-template-rows: 414px 130px 155px 22px;
    }
    .item{
      background-color: #F0F1EC;
    }
    .red{
      background-color: #E72F24;
    }
    .yellow{
      background-color: #F9D01E;
    }
    .blue{
      background-color : #004592;
      border-bottom : 10px solid #000;
    }
    .white1{
      grid-column : span 3;
    }
    .white2{
      grid-row :span 2;
    }

    .white3{
      grid-area : 2/ 2 /4 / 4;
    }

    .white4{
      grid-row : span 2;
    }
    .black{
      background-color: #000;
    }
  </style>
</head>

<body>
  <!-- Write your HTML here -->
  <div class="container">
    <div class="item red ">1</div>
    <div class="item white1">2</div>
    <div class="item white2">3</div>
    <div class="item white3">4</div>

    <div class="item blue">5</div>
    <div class="item white4">6</div>

    <div class="item ">7</div>
    <div class="item yellow">8</div>
    <div class="item black">9</div>
  </div>
</body>

</html>
